services:
  mcp-server:
    build: .
    image: mcp-governance-hub:latest
    container_name: mcp-governance-hub
    volumes:
      # Workspace Mode (development): mounts the parent directory so a single
      # Hub instance can govern all sibling projects simultaneously.
      #
      # ⚠ Strict Mode (recommended for sensitive tasks): replace with:
      #   - /absolute/path/to/specific-project:/projects
      - ..:/projects
    environment:
      - PROJECTS_ROOT=/projects
      - NODE_ENV=development
    # stdin_open is required for MCP stdio JSON-RPC communication.
    # tty must be FALSE — a pseudo-TTY injects control characters that
    # corrupt the JSON-RPC stream.
    stdin_open: true
    tty: false
